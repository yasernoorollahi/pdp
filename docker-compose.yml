# اضافه شد: Docker Compose برای local development infra
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pdp-postgres
    environment:
      POSTGRES_DB: pdp
      POSTGRES_USER: pdp_user
      POSTGRES_PASSWORD: pdp123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdp_user -d pdp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pdp-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prometheus برای metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: pdp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - app

  # Grafana برای dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: pdp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  app:
    build: .
    container_name: pdp-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pdp
      SPRING_DATASOURCE_USERNAME: pdp_user
      SPRING_DATASOURCE_PASSWORD: pdp123
      PDP_JWT_SECRET: change-this-in-production-must-be-at-least-32-chars
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  grafana-data:
