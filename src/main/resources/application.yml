### ===================== Application =====================
spring.application.name: personal-data-platform
spring.profiles.default: dev

### ===================== Jobs =====================
jobs.refresh-token.enabled: true
jobs.notification-email.enabled: true
jobs.user-message-analysis.enabled: true
jobs.user-message-analysis.batch-size: 5
jobs.user-message-analysis.cron: "0 */1 * * * ?"
jobs.ai-signal-engine.enabled: true
jobs.ai-signal-engine.batch-size: 1
jobs.ai-signal-engine.max-retries: 3
jobs.ai-signal-engine.cron: "0 */3 * * * ?"
jobs.ai-signal-engine.pipeline-version: "ai-signal-engine-v1"

### ===================== Signal Normalization Job =====================
jobs.signal-normalization.enabled: true
jobs.signal-normalization.batch-size: 100
jobs.signal-normalization.delay-ms: 5000
jobs.signal-normalization.version: 1

### ===================== Test Data =====================
jobs.test-data.enabled: false
jobs.test-data.force: false
jobs.test-data.users: 50
jobs.test-data.refresh-tokens-per-user: 50
jobs.test-data.daily-behavior.enabled: false
jobs.test-data.daily-behavior.user-email:
jobs.test-data.daily-behavior.days: 60

### ===================== DataSource =====================
spring.datasource.driver-class-name: org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size: 20
spring.datasource.hikari.minimum-idle: 5
spring.datasource.hikari.idle-timeout: 300000
spring.datasource.hikari.connection-timeout: 20000
spring.datasource.hikari.max-lifetime: 1200000
spring.datasource.hikari.pool-name: PdpHikariPool

### ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto: validate
spring.jpa.show-sql: false
spring.jpa.properties.hibernate.format_sql: false
spring.jpa.database-platform: org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size: 25
spring.jpa.properties.hibernate.order_inserts: true
spring.jpa.properties.hibernate.order_updates: true

### ===================== Flyway =====================
spring.flyway.enabled: true
spring.flyway.baseline-on-migrate: false
spring.flyway.validate-on-migrate: true
spring.flyway.locations: classpath:db/migration

spring.flyway.clean-disabled: false
spring.flyway.depends-on: dataSource

### ===================== Swagger =====================
springdoc.api-docs.enabled: true
springdoc.swagger-ui.enabled: true
springdoc.swagger-ui.path: /swagger

### ===================== Spring Actuator =====================
management.endpoints.web.exposure.include: health, info, metrics, prometheus
management.endpoint.health.show-details: when_authorized
management.endpoint.health.show-components: when_authorized
management.endpoint.health.roles: ADMIN
management.health.diskspace.threshold: 100MB

### ===================== OpenTelemetry =====================
otel.service.name: pdp
otel.exporter.otlp.endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
#otel.traces.exporter: otlp // I disabled oltp for dev but it should be enabled on prod
otel.traces.exporter: none
otel.metrics.exporter: none
otel.logs.exporter: none

### ===================== Resilience =====================
#resilience4j.circuitbreaker.instances.ai-engine.failure-rate-threshold: 50
#resilience4j.circuitbreaker.instances.ai-engine.sliding-window-size: 10
#resilience4j.circuitbreaker.instances.ai-engine.wait-duration-in-open-state: 30s

### ===================== PDP AI Signal =====================
pdp.ai.extraction.base-url: http://localhost:3000
pdp.ai.extraction.default-provider: ollama
pdp.ai.extraction.default-model: qwen2.5:7b
pdp.ai.extraction.connect-timeout: 300s
pdp.ai.extraction.read-timeout: 310s

### ===================== JWT =====================
pdp.jwt.access-token-expiration-ms: 900000

### ===================== Async Executor =====================
spring.task.execution.pool.core-size: 5
spring.task.execution.pool.max-size: 20
spring.task.execution.pool.queue-capacity: 500
spring.task.execution.thread-name-prefix: pdp-async-

### ===================== Logging =====================
# Enable/disable all logging (true/false)
logging.enabled: false
# Log only slow Hibernate queries (e.g. execution time > 30ms)
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS: 30
